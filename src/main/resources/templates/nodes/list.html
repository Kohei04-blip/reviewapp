<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ノード一覧</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>ノード一覧</h1>
        <a href="/nodes/new" class="btn btn-primary">新規登録</a>
    </div>

    <form action="/nodes" method="get" class="mb-4">
        <div class="input-group">
            <input type="text" name="keyword" class="form-control" placeholder="キーワードで検索" th:value="${keyword}">
            <select name="categoryId" class="form-select">
                <option value="">すべてのカテゴリ</option>
                <option
                    th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}"
                    th:selected="${category.id == categoryId}">
                </option>
            </select>
            <button type="submit" class="btn btn-outline-primary">検索</button>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(nodes)}" class="alert alert-info">
        まだノードが登録されていません。
    </div>

    <div class="card mb-3" th:each="node : ${nodes}">
        <div class="card-body">
            <h5 class="card-title" th:text="${node.title}"></h5>
            <p class="card-text" th:text="${node.content}"></p>

            <p class="text-muted">
                カテゴリ：
                <span th:text="${node.category != null ? node.category.name : '未設定'}"></span>
            </p>

            <div class="d-flex gap-2">
                <a class="btn btn-outline-primary btn-sm"
                   th:href="@{/nodes/{id}/edit(id=${node.id})}">
                    編集
                </a>

                <form th:action="@{/nodes/{id}/delete(id=${node.id})}" method="post">
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        削除
                    </button>
                </form>
            </div>
        </div>
    </div>

</div>

</body>
</html>
