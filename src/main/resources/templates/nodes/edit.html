<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ノード編集</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card">
        <div class="card-body">
            <h1 class="mb-4">ノード編集</h1>

            <form th:action="@{/nodes/{id}(id=${nodeId})}" th:object="${nodeForm}" method="post">
                
                <div class="mb-3">
                    <label class="form-label">タイトル</label>
                    <input type="text" th:field="*{title}" class="form-control">

                    <div class="text-danger mt-1"
                         th:if="${#fields.hasErrors('title')}"
                         th:errors="*{title}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">カテゴリ</label>

                    <select th:field="*{categoryId}" class="form-select">
                        <option value="">カテゴリを選択</option>

                        <option
                            th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">内容</label>
                    <input type="text" th:field="*{content}" class="form-control">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">更新</button>
                    <a href="/nodes" class="btn btn-secondary">戻る</a>
                </div>
            </form>

            <form th:action="@{/nodes/{id}/ai-correct(id=${nodeId})}"
                  th:object="${nodeForm}"
                  method="post"
                  class="mt-3">

                <input type="hidden" th:field="*{title}">
                <input type="hidden" th:field="*{content}">

                <button type="submit" class="btn btn-outline-success">
                    AIで補正
                </button>
            </form>

        </div>
    </div>

</div>

</body>
</html>
